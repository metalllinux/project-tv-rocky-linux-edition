apiVersion: v1
kind: Secret
metadata:
  name: jellyfin-api-secret
  namespace: project-tv
type: Opaque
stringData:
  # This API key is generated after Jellyfin's first boot.
  # Go to: Administration > API Keys > Add
  # Then update this secret with the real key:
  #   kubectl -n project-tv create secret generic jellyfin-api-secret \
  #     --from-literal=api-key=YOUR_API_KEY --dry-run=client -o yaml | kubectl apply -f -
  api-key: "PLACEHOLDER_GENERATE_IN_JELLYFIN_ADMIN"
