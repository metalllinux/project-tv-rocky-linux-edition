#!/bin/bash
# defaults.conf — Default configuration values for the installer
# These can be overridden by user input during installation.

# --- System ---
TIMEZONE="Asia/Tokyo"

# --- ZFS ---
ZFS_POOL_NAME="mediapool"
ZFS_MOUNT_BASE="/mnt"
ZFS_ASHIFT=12

# --- Kubernetes ---
K8S_NAMESPACE="project-tv"
K8S_POD_NETWORK_CIDR="10.244.0.0/16"

# --- Container images ---
JELLYFIN_IMAGE="lscr.io/linuxserver/jellyfin:latest"
MIRAKURUN_IMAGE="chinachu/mirakurun:latest"
MARIADB_IMAGE="mariadb:10.5"
EPGSTATION_IMAGE="l3tnun/epgstation:latest"
TUBEARCHIVIST_IMAGE="bbilly1/tubearchivist:latest"
TUBEARCHIVIST_ES_IMAGE="bbilly1/tubearchivist-es:latest"
REDIS_IMAGE="redis/redis-stack-server:latest"
NAVIDROME_IMAGE="deluan/navidrome:latest"
PROMETHEUS_IMAGE="prom/prometheus:latest"
GRAFANA_IMAGE="grafana/grafana:latest"

# --- Application ports ---
JELLYFIN_PORT=8096
EPGSTATION_PORT=8888
EPGSTATION_PORT_ALT=8889
MIRAKURUN_PORT=40772
TUBEARCHIVIST_PORT=8000
NAVIDROME_PORT=4533
PROMETHEUS_PORT=9090
GRAFANA_PORT=3000

# --- Storage ---
MEDIA_BASE_DIR="/home/${SUDO_USER:-$(whoami)}/media"
STORAGE_PATHS_CONF=""  # Set at runtime by module 05

# --- User ---
PUID=1000
PGID=1000

# --- Backup ---
BACKUP_SERVER=""
BACKUP_USER=""
BACKUP_PATH=""

# --- SELinux ---
# Options: "permissive" or "enforcing"
SELINUX_MODE="permissive"
