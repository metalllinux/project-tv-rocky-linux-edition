apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node
  namespace: project-tv
  labels:
    app: grafana
data:
  node-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "fillOpacity": 20 }
            }
          },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "Total CPU Usage",
              "refId": "A"
            },
            {
              "expr": "avg(rate(node_cpu_seconds_total{mode=\"user\"}[5m]))",
              "legendFormat": "User",
              "refId": "B"
            },
            {
              "expr": "avg(rate(node_cpu_seconds_total{mode=\"system\"}[5m]))",
              "legendFormat": "System",
              "refId": "C"
            },
            {
              "expr": "avg(rate(node_cpu_seconds_total{mode=\"iowait\"}[5m]))",
              "legendFormat": "I/O Wait",
              "refId": "D"
            }
          ]
        },
        {
          "title": "CPU Usage Per Core",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "1 - rate(node_cpu_seconds_total{mode=\"idle\"}[5m])",
              "legendFormat": "CPU {{cpu}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "fillOpacity": 20 }
            }
          },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes",
              "legendFormat": "Total",
              "refId": "A"
            },
            {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "Used",
              "refId": "B"
            },
            {
              "expr": "node_memory_Cached_bytes",
              "legendFormat": "Cached",
              "refId": "C"
            },
            {
              "expr": "node_memory_Buffers_bytes",
              "legendFormat": "Buffers",
              "refId": "D"
            }
          ]
        },
        {
          "title": "Memory Breakdown",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 30 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "Memory Used",
              "refId": "A"
            }
          ]
        },
        {
          "title": "CPU Load Average",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 30 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 4 },
                  { "color": "red", "value": 8 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "node_load1",
              "legendFormat": "1m Load",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Disk Usage",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 30 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})",
              "legendFormat": "Root (/)",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Network Traffic",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 38 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 20 }
            }
          },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "Receive ({{device}})",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "Transmit ({{device}})",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["node", "system"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Node Overview",
      "uid": "node-overview"
    }
