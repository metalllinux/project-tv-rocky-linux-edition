apiVersion: v1
kind: ConfigMap
metadata:
  name: epgstation-config
  namespace: project-tv
data:
  config.yml: |
    port: 8888
    socketioPort: 8889
    mirakurunPath: http://mirakurun:40772

    dbtype: mysql
    mysql:
      host: mariadb
      port: 3306
      user: epgstation
      password: CHANGE_ME_EPGSTATION_PASSWORD
      database: epgstation
      charset: utf8mb4

    epgUpdateIntervalTime: 10

    conflictPriority: 1
    recPriority: 2

    recorded:
      - name: recorded
        path: /app/recorded

    thumbnail: /app/thumbnail
    thumbnailSize: 480x270
    thumbnailPosition: 5

    ffmpeg: /usr/local/bin/ffmpeg
    ffprobe: /usr/local/bin/ffprobe

    encode:
      - name: H.264
        cmd: >-
          %FFMPEG% -dual_mono_mode main -i pipe:0 -c:a aac -ar 48000 -b:a 192k
          -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
          -y -f mp4 pipe:1
        suffix: .mp4
        rate: 4.0

  operatorLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/Operator.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info

  epgUpdaterLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/EPGUpdater.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info

  serviceLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/Service.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info
