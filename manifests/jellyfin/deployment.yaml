apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: project-tv
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
      - name: jellyfin
        image: lscr.io/linuxserver/jellyfin:latest
        ports:
        - containerPort: 8096
          name: http
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Asia/Tokyo"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: cache
          mountPath: /cache
        # Media library mounts — paths updated by installer from datasets.conf
        # Each ZFS dataset is mounted under /data/<name>
        # PLACEHOLDER: The installer module (08-jellyfin.sh) dynamically generates
        # volume mounts based on the user's ZFS datasets from config/datasets.conf
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: config
        hostPath:
          path: /var/lib/project-tv/jellyfin/config
          type: DirectoryOrCreate
      - name: cache
        hostPath:
          path: /var/lib/project-tv/jellyfin/cache
          type: DirectoryOrCreate
      # PLACEHOLDER: Media volume entries generated by installer
