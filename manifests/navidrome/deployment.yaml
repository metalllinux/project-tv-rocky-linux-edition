apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: project-tv
  labels:
    app: navidrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      containers:
      - name: navidrome
        image: deluan/navidrome:latest
        ports:
        - containerPort: 4533
          name: http
        env:
        - name: ND_SCANSCHEDULE
          value: "1h"
        - name: ND_LOGLEVEL
          value: "info"
        - name: ND_SESSIONTIMEOUT
          value: "24h"
        - name: ND_BASEURL
          value: ""
        volumeMounts:
        - name: data
          mountPath: /data
        - name: music
          mountPath: /music
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /app
            port: 4533
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /app
            port: 4533
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        hostPath:
          path: /var/lib/project-tv/navidrome/data
          type: DirectoryOrCreate
      - name: music
        hostPath:
          # PLACEHOLDER: replaced by installer with user's ZFS music dataset path
          path: /mnt/mediapool/music
          type: DirectoryOrCreate
