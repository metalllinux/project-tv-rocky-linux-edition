apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: project-tv
  labels:
    app: grafana
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus.project-tv.svc.cluster.local:9090
      isDefault: true
      editable: true
