# Project TV - Rocky Edition Custom ISO Kickstart
graphical
harddrive --partition=LABEL=Rocky-10-1-x86_64-dvd --dir=/
repo --name="BaseOS" --baseurl=file:///run/install/repo/BaseOS
repo --name="AppStream" --baseurl=file:///run/install/repo/AppStream
lang en_US.UTF-8
keyboard us
timezone Asia/Tokyo --utc
network --bootproto=dhcp --onboot=on --activate
# User and root password — set during Anaconda graphical install
# Remove the comments below and set values to skip the Anaconda prompts:
#rootpw --plaintext YOUR_ROOT_PASSWORD
#user --name=YOUR_USERNAME --plaintext --password=YOUR_PASSWORD --groups=wheel
ignoredisk --only-use=nvme0n1
zerombr
clearpart --all --initlabel --drives=nvme0n1
bootloader --location=mbr --boot-drive=nvme0n1
part /boot/efi --fstype=efi --size=600 --ondisk=nvme0n1
part /boot --fstype=xfs --size=1024 --ondisk=nvme0n1
part pv.01 --size=1 --grow --ondisk=nvme0n1
volgroup rl_project-tv pv.01
logvol /    --fstype=xfs  --name=root --vgname=rl_project-tv --size=71680
logvol swap              --name=swap --vgname=rl_project-tv --size=8192
logvol /home --fstype=xfs --name=home --vgname=rl_project-tv --size=1 --grow
selinux --permissive
firewall --disabled
reboot

%pre
for disk in /dev/nvme0n1 /dev/sda /dev/sdb; do
    [ -b "$disk" ] && dd if=/dev/zero of="$disk" bs=1M count=10 2>/dev/null
done
%end

%packages
@core
@development
kernel-devel
kernel-modules-extra
git
gcc
make
curl
wget
rsync
tar
openssh-server
NetworkManager
%end

%post --log=/root/ks-post.log
# Grant NOPASSWD sudo to the first non-root user in /home
INSTALL_USER=$(ls /home/ 2>/dev/null | head -1)
if [ -n "$INSTALL_USER" ]; then
    echo "$INSTALL_USER ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/$INSTALL_USER
    chmod 440 /etc/sudoers.d/$INSTALL_USER
fi
systemctl enable sshd || true
systemctl enable NetworkManager || true

cat > /etc/systemd/system/project-tv-firstboot.service << 'SVCEOF'
[Unit]
Description=Project TV First Boot Setup (KDE + extras)
After=network-online.target
Wants=network-online.target
ConditionPathExists=!/root/.project-tv-firstboot-done

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/root/project-tv-firstboot.sh
TimeoutStartSec=3600

[Install]
WantedBy=multi-user.target
SVCEOF

cat > /root/project-tv-firstboot.sh << 'SCRIPTEOF'
#!/bin/bash
exec > /root/project-tv-firstboot.log 2>&1
echo "=== Project TV First Boot Setup ==="
echo "Date: $(date)"
# Detect the first non-root user
INSTALL_USER=$(ls /home/ 2>/dev/null | head -1)
echo "Install user: $INSTALL_USER"
for i in $(seq 1 30); do
    ping -c 1 -W 3 dl.rockylinux.org >/dev/null 2>&1 && break
    echo "Waiting for network... ($i/30)"
    sleep 5
done
dnf install -y epel-release || true
dnf install -y dnf-plugins-core || true
dnf config-manager --set-enabled crb || true

# Ensure kernel-modules-extra and kernel-devel match the running kernel
# (needed for Kubernetes netfilter modules and DKMS builds)
echo "Installing kernel modules and devel for $(uname -r)..."
dnf install -y kernel-modules-extra-$(uname -r) || true
dnf install -y kernel-devel-$(uname -r) || true

# Load and persist netfilter modules required by Kubernetes (kube-proxy + Flannel)
echo "Loading netfilter modules for Kubernetes..."
for mod in nf_conntrack br_netfilter xt_conntrack xt_comment xt_mark ip_tables ip6_tables nf_nat overlay; do
    modprobe "$mod" 2>/dev/null && echo "  Loaded: $mod" || echo "  Skipped: $mod (not available)"
done
cat > /etc/modules-load.d/kubernetes.conf << 'MODEOF'
nf_conntrack
br_netfilter
xt_conntrack
xt_comment
xt_mark
ip_tables
ip6_tables
nf_nat
overlay
MODEOF

# Set required sysctl for Kubernetes networking
cat > /etc/sysctl.d/99-kubernetes.conf << 'SYSEOF'
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.ipv4.ip_forward = 1
SYSEOF
sysctl --system || true

# Install ZFS (sda/sdb preserved for mirrored pool, created later via installer module 02)
echo "Installing ZFS..."
dnf install -y https://zfsonlinux.org/epel/zfs-release-3-0.el10.noarch.rpm || true
dnf install -y zfs-dkms zfs || true
modprobe zfs || true

# Update all packages first to resolve version mismatches (e.g. firewalld, vim-data)
# that cause group install conflicts between @System and repo versions
echo "Updating all packages before KDE install..."
dnf update -y || true

echo "Installing KDE Plasma and tools..."
dnf install -y --allowerasing --nobest --exclude='kernel*' @"KDE Plasma Workspaces" plasma-desktop plasma-workspace sddm kwin dkms vim-enhanced bash-completion flatpak || true
# Retry core packages individually if group install had issues
rpm -q plasma-desktop >/dev/null 2>&1 || dnf install -y --allowerasing plasma-desktop sddm kwin plasma-workspace || true
rpm -q dkms >/dev/null 2>&1 || dnf install -y dkms || true
rpm -q flatpak >/dev/null 2>&1 || dnf install -y flatpak || true

# Install essential KDE applications (not included in the Plasma Workspaces group)
echo "Installing essential KDE applications..."
dnf install -y konsole dolphin kate spectacle ark okular gwenview kcalc || true
# Retry critical ones individually — konsole is required for the autostart installer prompt
rpm -q konsole >/dev/null 2>&1 || dnf install -y konsole || true
rpm -q dolphin >/dev/null 2>&1 || dnf install -y dolphin || true
systemctl set-default graphical.target
systemctl enable sddm.service || true
systemctl disable gdm.service 2>/dev/null || true
flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo || true
# Clone Project TV repo (bypass ksshaskpass which fails non-interactively)
if [ ! -d /home/$INSTALL_USER/project_tv_rocky_linux/install.sh ]; then
    rm -rf /home/$INSTALL_USER/project_tv_rocky_linux 2>/dev/null
    su - $INSTALL_USER -c "GIT_ASKPASS='' GIT_TERMINAL_PROMPT=0 git clone https://github.com/metalllinux/project-tv-rocky-linux-edition.git /home/$INSTALL_USER/project_tv_rocky_linux" || true
fi
# If clone failed (private repo), the ISO mount copy below will be the fallback
chown -R $INSTALL_USER:$INSTALL_USER /home/$INSTALL_USER/project_tv_rocky_linux 2>/dev/null || true
touch /root/.project-tv-firstboot-done
sync
echo "=== First boot setup complete. Rebooting into KDE... ==="
sleep 3
systemctl reboot
SCRIPTEOF

chmod +x /root/project-tv-firstboot.sh
systemctl enable project-tv-firstboot.service

# Move Project TV files from staging location (copied by %post --nochroot) into /home
if [ -d /tmp/project_tv_rocky_linux ]; then
    mv /tmp/project_tv_rocky_linux /home/$INSTALL_USER/project_tv_rocky_linux
    chown -R $INSTALL_USER:$INSTALL_USER /home/$INSTALL_USER/project_tv_rocky_linux
    chmod +x /home/$INSTALL_USER/project_tv_rocky_linux/install.sh
    echo "Project TV moved to /home/$INSTALL_USER/project_tv_rocky_linux"
fi

# Create KDE autostart entry to launch installer on first login
mkdir -p /home/$INSTALL_USER/.config/autostart
cat > /home/$INSTALL_USER/.config/autostart/project-tv-installer.desktop << 'DESKTOPEOF'
[Desktop Entry]
Type=Application
Name=Project TV Installer
Comment=Launch Project TV installer on first login
Exec=konsole -e bash -c 'if [ -x ~/project_tv_rocky_linux/install.sh ]; then echo "=== Project TV - Rocky Linux Edition Installer ==="; echo ""; cd ~/project_tv_rocky_linux; sudo ./install.sh; exec bash; else echo "=== Project TV - Rocky Linux Edition ==="; echo ""; echo "Downloading the latest installer..."; echo ""; git clone https://github.com/metalllinux/project-tv-rocky-linux-edition.git ~/project_tv_rocky_linux && cd ~/project_tv_rocky_linux && sudo ./install.sh; exec bash; fi'
Terminal=false
X-KDE-autostart-phase=2
DESKTOPEOF
chown -R $INSTALL_USER:$INSTALL_USER /home/$INSTALL_USER/.config

# Disable sleep/suspend in KDE Power Management
mkdir -p /home/$INSTALL_USER/.config
cat > /home/$INSTALL_USER/.config/powermanagementprofilesrc << 'PWREOF'
[AC][SuspendSession]
idleAction=0
suspendThenHibernate=false
suspendType=1

[AC][DPMSControl]
idleTimeout=0
lockBeforeTurnOff=0

[AC][DimDisplay]
idleTimeout=0

[AC][HandleButtonEvents]
lidAction=0
powerButtonAction=0
powerDownAction=0

[Battery][SuspendSession]
idleAction=0
suspendThenHibernate=false

[Battery][DPMSControl]
idleTimeout=0

[Battery][DimDisplay]
idleTimeout=0

[LowBattery][SuspendSession]
idleAction=0
suspendThenHibernate=false

[LowBattery][DPMSControl]
idleTimeout=0

[LowBattery][DimDisplay]
idleTimeout=0
PWREOF
chown $INSTALL_USER:$INSTALL_USER /home/$INSTALL_USER/.config/powermanagementprofilesrc

# Disable all KDE Screen Edges (no action on hover/push)
cat > /home/$INSTALL_USER/.config/kwinrc << 'KWINEOF'
[Effect-overview]
BorderActivate=9

[Effect-windowview]
BorderActivateAll=9

[ElectricBorders]
Bottom=None
BottomLeft=None
BottomRight=None
Left=None
Right=None
Top=None
TopLeft=None
TopRight=None
KWINEOF
chown $INSTALL_USER:$INSTALL_USER /home/$INSTALL_USER/.config/kwinrc

# Disable systemd sleep/suspend targets as a belt-and-braces measure
systemctl mask sleep.target suspend.target hibernate.target hybrid-sleep.target

echo "Kickstart post-install complete" > /root/ks-complete
%end

%post --nochroot --log=/mnt/sysimage/root/ks-post-nochroot.log
# Copy Project TV from the ISO media to the installed system
# %post --nochroot has access to Anaconda mount paths; the installed system is at /mnt/sysimage
for mnt in /run/install/repo /run/install/source /mnt/install/source; do
    if [ -d "${mnt}/project_tv_rocky_linux" ]; then
        cp -a "${mnt}/project_tv_rocky_linux" /mnt/sysimage/tmp/project_tv_rocky_linux
        echo "Project TV copied from ${mnt}"
        break
    fi
done
%end
