apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: project-tv
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
      containers:
      - name: elasticsearch
        image: bbilly1/tubearchivist-es:latest
        ports:
        - containerPort: 9200
        env:
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tubearchivist-secret
              key: ELASTIC_PASSWORD
        - name: ES_JAVA_OPTS
          value: "-Xms1g -Xmx1g"
        - name: xpack.security.enabled
          value: "true"
        - name: discovery.type
          value: "single-node"
        - name: path.repo
          value: "/usr/share/elasticsearch/data/snapshot"
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
      volumes:
      - name: data
        hostPath:
          path: /var/lib/project-tv/tube-archivist/elasticsearch
          type: DirectoryOrCreate
