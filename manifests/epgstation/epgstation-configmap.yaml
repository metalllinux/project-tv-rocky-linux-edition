apiVersion: v1
kind: ConfigMap
metadata:
  name: epgstation-config
  namespace: project-tv
data:
  config.yml: |
    port: 8888
    socketioPort: 8889
    mirakurunPath: http://mirakurun:40772

    dbtype: mysql
    mysql:
      host: mariadb
      port: 3306
      user: epgstation
      password: CHANGE_ME_EPGSTATION_PASSWORD
      database: epgstation
      charset: utf8mb4

    epgUpdateIntervalTime: 10

    conflictPriority: 1
    recPriority: 2

    recorded:
      - name: recorded
        path: /app/recorded

    thumbnail: /app/thumbnail
    thumbnailSize: 480x270
    thumbnailPosition: 5

    ffmpeg: /usr/bin/ffmpeg
    ffprobe: /usr/bin/ffprobe

    streamFilePath: /app/streamfiles
    encodeProcessNum: 4

    stream:
      live:
        ts:
          m2ts:
            - name: 無変換
              isUnconverted: true
          m2tsll:
            - name: 無変換 (低遅延)
              isUnconverted: true
          webm:
            - name: WebM 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a libvorbis -ar 48000 -b:a 192k
                -ac 2 -c:v libvpx-vp9 -vf yadif,scale=-2:720 -b:v 3000k -deadline realtime
                -cpu-used 4 -y -f webm pipe:1
            - name: WebM 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a libvorbis -ar 48000 -b:a 128k
                -ac 2 -c:v libvpx-vp9 -vf yadif,scale=-2:480 -b:v 1500k -deadline realtime
                -cpu-used 4 -y -f webm pipe:1
          mp4:
            - name: H.264 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -tune zerolatency -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
            - name: H.264 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 128k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -tune zerolatency -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: HLS 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -flags +loop-global_header -f hls -hls_time 3 -hls_list_size 17
                -hls_allow_cache 1 -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments %OUTPUT%
            - name: HLS 480p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 128k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:480 -b:v 1500k -preset veryfast
                -flags +loop-global_header -f hls -hls_time 3 -hls_list_size 17
                -hls_allow_cache 1 -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments %OUTPUT%
      recorded:
        ts:
          webm:
            - name: WebM 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a libvorbis -ar 48000 -b:a 192k
                -ac 2 -c:v libvpx-vp9 -vf yadif,scale=-2:720 -b:v 3000k -deadline realtime
                -cpu-used 4 -y -f webm pipe:1
          mp4:
            - name: H.264 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -movflags frag_keyframe+empty_moov+faststart+default_base_moof
                -y -f mp4 pipe:1
          hls:
            - name: HLS 720p
              cmd: >-
                %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k
                -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
                -flags +loop-global_header -f hls -hls_time 3 -hls_list_size 17
                -hls_allow_cache 1 -hls_segment_filename %streamFileDir%/stream%streamNum%-%09d.ts
                -hls_flags delete_segments %OUTPUT%

    encode:
      - name: H.264 (QSV)
        cmd: >-
          %FFMPEG% -dual_mono_mode main -init_hw_device qsv=qsv:hw -hwaccel qsv -hwaccel_output_format qsv
          -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k -ac 2
          -c:v h264_qsv -vf yadif,scale=-2:720 -b:v 3000k -preset faster
          -y -f mp4 pipe:1
        suffix: .mp4
        rate: 4.0
      - name: H.264 (Software)
        cmd: >-
          %FFMPEG% -dual_mono_mode main -i pipe:0 -map 0:v -map 0:a -ignore_unknown -c:a aac -ar 48000 -b:a 192k
          -ac 2 -c:v libx264 -vf yadif,scale=-2:720 -b:v 3000k -preset veryfast
          -y -f mp4 pipe:1
        suffix: .mp4
        rate: 4.0

  operatorLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/Operator.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info

  epgUpdaterLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/EPGUpdater.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info

  serviceLogConfig.yml: |
    appenders:
      console:
        type: console
        layout:
          type: pattern
          pattern: "[%d{yyyy-MM-dd hh:mm:ss.SSS}] [%p] %m"
      file:
        type: file
        filename: /app/logs/Service.log
        maxLogSize: 1048576
        backups: 3
    categories:
      default:
        appenders:
          - console
          - file
        level: info
