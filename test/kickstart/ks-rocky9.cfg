# Kickstart for Rocky Linux 9 Test VM
# Project TV - Rocky Edition automated testing

lang en_US.UTF-8
keyboard us
timezone Asia/Tokyo --utc

network --bootproto=dhcp --onboot=on --activate --hostname=rocky9-test

rootpw --plaintext testpassword123
user --name=testuser --password=testpassword123 --plaintext --groups=wheel

zerombr
clearpart --all --initlabel
autopart --type=lvm

%packages
@core
@development
kernel-devel
git
make
gcc
curl
wget
rsync
tar
%end

%post --log=/root/ks-post.log
dnf install -y epel-release
dnf install -y dkms

systemctl enable sshd

echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser
chmod 440 /etc/sudoers.d/testuser

nmcli con mod "$(nmcli -t -f NAME con show | head -1)" connection.autoconnect yes 2>/dev/null || true

echo "Kickstart post-install complete" > /root/ks-complete
%end

reboot
