apiVersion: v1
kind: Service
metadata:
  name: epgstation
  namespace: project-tv
  labels:
    app: epgstation
spec:
  type: NodePort
  selector:
    app: epgstation
  ports:
  - name: http
    port: 8888
    targetPort: 8888
    nodePort: 30888
  - name: socketio
    port: 8889
    targetPort: 8889
    nodePort: 30889
